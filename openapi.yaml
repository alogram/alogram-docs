  /v1/scores/{tenantId}:
    get:
      operationId: getFraudScores
      parameters:
        - description: Echoed or generated trace ID for tracking requests.
          explode: false
          in: header
          name: x-trace-id
          required: false
          schema:
            $ref: "#/components/schemas/TraceId"
