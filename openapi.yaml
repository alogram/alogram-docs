openapi: 3.0.4
info:
  contact:
    email: packages@alogram.ai
    name: Alogram Engineering
    url: https://developers.alogram.ai
  description: "Alogram PayRisk is an AI-native decision engine built for the speed and \ncomplexity of the modern commerce era. In a high-velocity world where \nAI-driven threats evolve in milliseconds, Alogram provides the real-time \nadaptability and forensic transparency needed to protect your ecosystem \nwith total confidence. We solve the challenge of balancing frictionless \ngrowth with regulatory explainability, delivering instant, intelligent \nrisk orchestration at enterprise scale.\n\n---\n\n\n## Licensing & Terms\n\n\nOur client libraries and API specifications are open-source under the **Apache License 2.0** \nto ensure seamless integration into your tech stack.\n\nUse of the Alogram PayRisk API service is proprietary and governed by our \n[Terms of Service](https://alogram.ai/#tos) and your specific **Enterprise Agreement**, \nif applicable.\n\nTo access the service, you must have:\n*   A valid Alogram API Key.\n*   An active subscription or signed Master Service Agreement.\n\
    \nUnauthorized use, including automated scraping or reverse engineering of the \nscoring engine, is strictly prohibited.\n\n\n---\n\n\n## Support & Traceability\n\n\nEvery Alogram API response includes a unique **`x-trace-id`** header. \nPlease include this ID when contacting [packages@alogram.ai](mailto:packages@alogram.ai) \nregarding specific transactions or errors.\n\n\n---\n\n\n## Specification\n\n\nThe authoritative OpenAPI specification for this version is available for download:\n**[Download openapi.yaml](https://developers.alogram.ai/openapi.yaml)** | **[Download openapi.json](https://developers.alogram.ai/openapi.json)**\n"
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: https://alogram.ai/#tos
  title: Alogram PayRisk Engine
  version: 0.2.9
  x-logo:
    url: logo.png
    altText: Alogram PayRisk Logo
    backgroundColor: "#FFFFFF"
servers:
  - description: Production Environment
    url: https://api.alogram.ai
  - description: Sandbox Environment (for integration testing)
    url: https://sandbox.api.alogram.ai
security:
  - ApiKey: []
  - oAuth2:
      - payrisk.write
tags:
  - description: Real-time risk assessment and automated decision orchestration.
    name: Risk Scoring
  - description: Ingestion of payment lifecycle events and behavioral telemetry.
    name: Signal Intelligence
  - description: Retrieval of historical assessments and deep forensic insights.
    name: Forensic Data
  - description: Service health and connectivity diagnostics.
    name: System
  - description: Future capabilities currently in active development or private beta.
    name: Roadmap & Preview
paths:
  /v1/risk/check:
    post:
      operationId: riskCheck
      parameters:
        - description: Echoed or generated trace ID for tracking requests.
          explode: false
          in: header
          name: x-trace-id
          required: false
          schema:
            $ref: "#/components/schemas/TraceId"
          style: simple
        - description: Unique Idempotency-Key sent in the POST request etc.
          in: header
          name: x-idempotency-key
          required: true
          schema:
            $ref: "#/components/schemas/IdempotencyKey"
      requestBody:
        content:
          application/json:
            example:
              paymentIntentId: pi_0123456789abcdef0123456789abcdef
              entities:
                tenantId: tid_acme_01
                clientId: cid_merchant_42
                endCustomerId: ecid_shopper_9f
                deviceId: did_a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6
                sessionId: sid_a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6
              identity:
                email: shopper@example.com
                phone: +1 (415) 555-2671
                shippingAddress:
                  line1: 123 Market Street
                  city: San Francisco
                  region: CA
                  postalCode: "94103"
                  country: US
              purchase:
                amount: 123.45
                currency: USD
                paymentMethod:
                  type: card
                  cardNetwork: visa
                  bin: "411111"
            schema:
              $ref: "#/components/schemas/CheckRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              example:
                assessmentId: pi_0123456789abcdef0123456789abcdef
                decision: approve
                decisionAt: 2023-12-14T15:45:30.123000Z
                riskScore: 0.12
                fraudScore:
                  score: 0.12
                  riskLevel: low
                  confidence: high
              schema:
                $ref: "#/components/schemas/DecisionResponse"
          description: Synchronous risk decision.
          headers:
            x-trace-id:
              $ref: "#/components/headers/TraceIdHeader"
            x-idempotency-key:
              $ref: "#/components/headers/XIdempotencyKeyHeader"
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: An error response.
          headers:
            x-trace-id:
              $ref: "#/components/headers/TraceIdHeader"
            x-idempotency-key:
              $ref: "#/components/headers/XIdempotencyKeyHeader"
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: An error response.
          headers:
            x-trace-id:
              $ref: "#/components/headers/TraceIdHeader"
            x-idempotency-key:
              $ref: "#/components/headers/XIdempotencyKeyHeader"
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: An error response.
          headers:
            x-trace-id:
              $ref: "#/components/headers/TraceIdHeader"
            x-idempotency-key:
              $ref: "#/components/headers/XIdempotencyKeyHeader"
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: An error response.
          headers:
            x-trace-id:
              $ref: "#/components/headers/TraceIdHeader"
            x-idempotency-key:
              $ref: "#/components/headers/XIdempotencyKeyHeader"
        "429":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: An error response.
          headers:
            x-trace-id:
              $ref: "#/components/headers/TraceIdHeader"
            x-idempotency-key:
              $ref: "#/components/headers/XIdempotencyKeyHeader"
        "500":
          content:
