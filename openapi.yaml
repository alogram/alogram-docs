    EntityIds:
      description: |
        Canonical entity identifiers (tenant/client/user/device/session). Do not send raw PII. Hash emails/phones/addresses as sha256 and prefix with 'sha256_'.
        Tiered support:
          - tenantId is the top-level SaaS customer (required for all flows).
          - clientId is the tenant's downstream business customer (e.g. merchant/partner) and MAY be omitted for
            processor / bank / PSP-style integrations.
          - endCustomerId is the tenant/client's consumer or business account (cardholder, shopper, etc.) and
            MAY be omitted for purely device- or instrument-level checks.
      example:
        clientId: cid_merchant_42
        emailHash: sha256_abcdef1234567890abcdef1234567890abcdef1234567890abcdef1234567890
        shippingAddressHash: sha256_e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855
        tenantId: tid_acme_01
        phoneHash: sha256_e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855
        paymentInstrumentId: tok_abcdef1234567890
        endCustomerId: ecid_shopper_9f
        sessionId: sid_a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6
        emailDomainHash: sha256_abcdef1234567890abcdef1234567890abcdef1234567890abcdef1234567890
        deviceId: did_a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6
        billingAddressHash: sha256_e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855
        memberId: mid_ops_27
      properties:
        tenantId:
          description: |
            Canonical ID for the paying organization (Tenant). Opaque, immutable, lowercase.  Must start with "tid_". Do not use domains or emails here. For a tenant's domain,  use a separate field (e.g., tenantDomain).
          example: tid_acme_01
          maxLength: 64
          minLength: 5
          pattern: "^tid_[a-z0-9\\-_]{2,60}$"
          title: TenantId
          type: string
          x-alogram-origin: server
          x-alogram-importance: system
        clientId:
          description: |
            Canonical ID for the Tenant’s business customer (e.g., merchant/partner).  Opaque, immutable, lowercase. Must start with 'cid_'.
          example: cid_merchant_42
          maxLength: 100
          minLength: 5
          pattern: "^cid_[a-z0-9\\-_]{2,96}$"
          title: ClientId
          type: string
          x-alogram-origin: server
          x-alogram-importance: recommended
        endCustomerId:
          description: |
            Canonical ID for the client’s end user / consumer (account holder).  Opaque, immutable, lowercase. Must start with "ecid_".  Do not put PII (like emails or phone numbers) in this field.
          example: ecid_shopper_9f
          maxLength: 100
          minLength: 6
          pattern: "^ecid_[a-z0-9\\-_]{2,96}$"
          title: EndCustomerId
          type: string
          x-alogram-origin: server
          x-alogram-importance: recommended
        memberId:
          description: |
            Canonical ID for a Tenant member/operator (employee/contractor) using the platform.  Opaque, immutable, lowercase. Must start with 'mid_'.
          example: mid_ops_27
          maxLength: 100
          minLength: 5
          pattern: "^mid_[a-z0-9\\-_]{2,96}$"
          title: MemberId
          type: string
        paymentInstrumentId:
          description: Tokenized instrument ID (non-PCI).
          example: tok_abcdef1234567890
          maxLength: 100
          pattern: "^[a-zA-Z0-9\\-_:]{2,96}$"
          type: string
          x-alogram-origin: server
          x-alogram-importance: recommended
        deviceId:
          description: |
            Server-issued stable device token (device-level identifier).
            Should persist across sessions and logins on the same browser/device.
          example: did_a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6
          maxLength: 100
          pattern: "^did_[a-zA-Z0-9\\-_:]{2,96}$"
          type: string
          x-alogram-origin: client
          x-alogram-importance: critical
          x-alogram-generator: uuid-v4-prefix
        sessionId:
          description: |
            Application/user session identifier (login or checkout session).
            Typically rotates more frequently than deviceId and may be tied to authentication.
          example: sid_a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6
          maxLength: 100
          pattern: "^sid_[a-zA-Z0-9\\-_:]{2,96}$"
          type: string
          x-alogram-origin: client
          x-alogram-importance: critical
          x-alogram-generator: uuid-v4-prefix
        emailHash:
          description: "Normalized+lowercased email hash (e.g., sha256)."
          example: sha256_abcdef1234567890abcdef1234567890abcdef1234567890abcdef1234567890
          maxLength: 71
          pattern: "^sha256_[0-9a-f]{64}$"
          type: string
          x-alogram-origin: server
          x-alogram-importance: recommended
          x-alogram-generator: sha256-prefix
        emailDomainHash:
          description: "Normalized+lowercased email *domain* hash (e.g., sha256)."
          example: sha256_abcdef1234567890abcdef1234567890abcdef1234567890abcdef1234567890
          maxLength: 71
          pattern: "^sha256_[0-9a-f]{64}$"
          type: string
        phoneHash:
          description: "Normalized+lowercased phone hash (e.g., sha256)."
          example: sha256_e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855
          maxLength: 71
          pattern: "^sha256_[0-9a-f]{64}$"
          type: string
        shippingAddressHash:
          description: "Normalized+lowercased shipping address hash (e.g., sha256)."
          example: sha256_e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855
          maxLength: 71
          pattern: "^sha256_[0-9a-f]{64}$"
          type: string
        billingAddressHash:
          description: "Normalized+lowercased billing address hash (e.g., sha256)."
          example: sha256_e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855
          maxLength: 71
          pattern: "^sha256_[0-9a-f]{64}$"
          type: string
      type: object
    PaymentIntentId:
      description: Server-minted unique payment identifier.
      example: pi_0123456789abcdef0123456789abcdef
      maxLength: 35
      minLength: 35
      pattern: "^pi_[a-f0-9]{32}$"
      title: PaymentIntentId
      type: string
    Account:
      description: The application-layer Account object.
      example:
        email: someemail@example-emails.com
        phone: +1 (415) 555-2671
        timestamp: 2023-12-14T15:45:30.123000Z
        deviceInfo:
          fingerprint: fp_5f4dcc3b5aa765d61d8327deb882cf99
          userAgent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10_15_7)
