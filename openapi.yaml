        - description: Unique Idempotency-Key sent in the GET request etc.
          in: header
          name: x-idempotency-key
          required: false
          schema:
            $ref: "#/components/schemas/IdempotencyKey"
        - explode: false
          in: path
          name: tenantId
          required: true
          schema:
            $ref: "#/components/schemas/TenantId"
          style: simple
        - explode: true
          in: query
          name: startTime
          required: false
          schema:
            $ref: "#/components/schemas/Timestamp"
          style: form
        - explode: true
          in: query
          name: endTime
          required: false
          schema:
            $ref: "#/components/schemas/Timestamp"
          style: form
        - explode: true
          in: query
          name: pageSize
          required: false
          schema:
            default: 50
            maximum: 500
            minimum: 1
            type: integer
          style: form
        - explode: true
          in: query
          name: pageToken
          required: false
          schema:
            type: string
          style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScoresSuccessResponse"
          description: List of fraud scores for a customer.
          headers:
            x-trace-id:
